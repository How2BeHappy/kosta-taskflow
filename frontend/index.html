<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-2xl mx-auto py-12 px-4">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">TaskFlow</h1>

    <!-- 업무 추가 폼 -->
    <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
      <div class="flex flex-col gap-3">
        <input
          id="taskTitle"
          type="text"
          placeholder="업무명 *"
          class="border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
        />
        <textarea
          id="taskDesc"
          placeholder="업무 내용"
          rows="2"
          class="border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none"
        ></textarea>
        <div class="flex gap-3">
          <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs text-gray-400">우선순위</label>
            <select
              id="taskPriority"
              class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            >
              <option value="high">높음</option>
              <option value="medium" selected>중간</option>
              <option value="low">낮음</option>
            </select>
          </div>
          <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs text-gray-400">시작일자</label>
            <input
              id="taskStartDate"
              type="date"
              class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
          </div>
          <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs text-gray-400">완료일자</label>
            <input
              id="taskDueDate"
              type="date"
              class="border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
          </div>
        </div>
        <button
          onclick="addTask()"
          class="bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-xl text-sm font-semibold transition"
        >업무 추가</button>
      </div>
    </div>

    <!-- 업무 목록 -->
    <div id="taskList" class="flex flex-col gap-3"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
