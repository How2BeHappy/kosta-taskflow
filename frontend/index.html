<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-xl mx-auto py-12 px-4">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">TaskFlow</h1>

    <!-- 업무 추가 -->
    <div class="flex gap-2 mb-6">
      <input
        id="taskInput"
        type="text"
        placeholder="새 업무를 입력하세요"
        class="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
      />
      <button
        onclick="addTask()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-3 rounded-xl text-sm font-semibold transition"
      >추가</button>
    </div>

    <!-- 업무 목록 -->
    <div id="taskList" class="flex flex-col gap-3"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
